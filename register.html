<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your account | ShekelShuk</title>
  <meta name="description" content="Create your ShekelShuk account and start earning credits in the school prediction market.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-dark: #07070f;
      --color-accent: #00ccff;
      --color-accent-deep: #009dcb;
      --color-accent-glow: rgba(0, 204, 255, 0.35);
      --color-border: rgba(7, 7, 15, 0.1);
      --color-text-soft: #5b6474;
      --shadow-lg: 0 30px 80px rgba(7, 7, 15, 0.15);
      --transition: 240ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      font-family: "Inter", sans-serif;
      color: var(--color-dark);
      background:
        radial-gradient(circle at top left, rgba(0, 204, 255, 0.14), transparent 28%),
        radial-gradient(circle at 90% 0%, rgba(0, 204, 255, 0.16), transparent 22%),
        linear-gradient(180deg, #f8fcff 0%, #ffffff 65%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--color-text-soft);
      line-height: 1.6;
    }

    .auth-shell {
      width: min(100%, 520px);
    }

    .auth-card {
      position: relative;
      padding: clamp(1.5rem, 4vw, 2.25rem);
      border-radius: 28px;
      border: 1px solid rgba(0, 204, 255, 0.16);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(248, 252, 255, 0.82)),
        radial-gradient(circle at top right, rgba(0, 204, 255, 0.1), transparent 30%);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.42);
      pointer-events: none;
    }

    .auth-logo {
      display: inline-flex;
      margin-bottom: 1rem;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-accent);
      text-shadow: 0 0 24px rgba(0, 204, 255, 0.2);
    }

    .auth-header {
      margin-bottom: 1.6rem;
    }

    .auth-header h1 {
      font-size: clamp(2.2rem, 8vw, 3.1rem);
      margin-bottom: 0.6rem;
    }

    .auth-form {
      display: grid;
      gap: 1rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
    }

    .field label {
      font-size: 0.93rem;
      font-weight: 700;
      color: #182337;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 54px;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      border: 1px solid var(--color-border);
      background: rgba(255, 255, 255, 0.92);
      color: var(--color-dark);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(0, 204, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(0, 204, 255, 0.14);
      transform: translateY(-1px);
    }

    .split-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 1.4rem;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--color-accent), #00b2de);
      color: #ffffff;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 18px 44px rgba(0, 204, 255, 0.28);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .btn-submit:hover,
    .btn-submit:focus-visible {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 22px 58px rgba(0, 204, 255, 0.38);
    }

    .auth-footer {
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
    }

    .auth-footer a {
      color: var(--color-accent-deep);
      font-weight: 700;
    }

    .success-message {
      display: none;
      margin-top: 1rem;
      padding: 1rem 1.1rem;
      border-radius: 16px;
      background: rgba(0, 204, 255, 0.1);
      color: #006683;
      border: 1px solid rgba(0, 204, 255, 0.18);
      font-weight: 700;
    }

    .success-message.show {
      display: block;
    }

    .helper-text {
      margin-top: -0.25rem;
      font-size: 0.9rem;
      color: var(--color-text-soft);
    }

    @media (max-width: 560px) {
      .split-fields {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="register-title">
      <a class="auth-logo" href="index.html" aria-label="Return to ShekelShuk landing page">ShekelShuk</a>
      <div class="auth-header">
        <h1 id="register-title">Create your account</h1>
        <p>Join the prediction market, earn your starting credits, and begin competing for real rewards.</p>
      </div>

      <form class="auth-form" id="register-form">
        <div class="field">
          <label for="full-name">Full Name</label>
          <input id="full-name" name="full-name" type="text" autocomplete="name" required aria-label="Full name">
        </div>

        <div class="field">
          <label for="email">Email or Student ID</label>
          <input id="email" name="email" type="text" autocomplete="username" required aria-label="Email or student ID">
          <p class="helper-text">Admin access is reserved for one account: maayansho2010@gmail.com</p>
        </div>

        <div class="split-fields">
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required aria-label="Password">
          </div>

          <div class="field">
            <label for="confirm-password">Confirm Password</label>
            <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required aria-label="Confirm password">
          </div>
        </div>

        <div class="field">
          <label for="grade">Grade</label>
          <select id="grade" name="grade" required aria-label="Grade">
            <option value="" selected disabled>Select your grade</option>
            <option value="7th">7th</option>
            <option value="8th">8th</option>
            <option value="9th">9th</option>
            <option value="10th">10th</option>
            <option value="11th">11th</option>
            <option value="12th">12th</option>
          </select>
        </div>

        <button class="btn-submit" type="submit" aria-label="Join ShekelShuk">Join ShekelShuk &rarr;</button>
      </form>

      <div class="success-message" id="success-message" aria-live="polite">
        Welcome to ShekelShuk! Redirecting to markets...
      </div>

      <p class="auth-footer">Already have an account? <a href="index.html">Log in</a></p>
    </section>
  </main>

  <script>
    const ADMIN_EMAIL = "maayansho2010@gmail.com";
    const form = document.getElementById("register-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (password !== confirmPassword) {
        document.getElementById("confirm-password").setCustomValidity("Passwords do not match.");
        document.getElementById("confirm-password").reportValidity();
        return;
      }

      document.getElementById("confirm-password").setCustomValidity("");
      const isAdmin = email === ADMIN_EMAIL;

      localStorage.setItem("shekelshuk_admin_email", ADMIN_EMAIL);
      localStorage.setItem("shekelshuk_current_user", email);
      localStorage.setItem("shekelshuk_role", isAdmin ? "admin" : "member");

      successMessage.textContent = isAdmin
        ? "Welcome back, admin. Redirecting to the market dashboard..."
        : "Welcome to ShekelShuk! Redirecting to markets...";
      successMessage.classList.add("show");
      form.reset();

      window.setTimeout(() => {
        window.location.href = "index.html";
      }, 1800);
    });

    document.getElementById("confirm-password").addEventListener("input", (event) => {
      event.target.setCustomValidity("");
    });
  </script>
</body>
</html>
